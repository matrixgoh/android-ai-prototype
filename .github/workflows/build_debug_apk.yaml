name: Build Debug APK

on:
  workflow_dispatch:
  push:
    branches: [ "main", "claude/**" ]
    paths:
      - 'Android/**'

jobs:
  build_debug_apk:
    name: Build Debug APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./Android/src
    steps:
      - name: Checkout the source code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-35 build-tools;35.0.0'

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --no-daemon

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: Android/src/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Update PR #2 with download link
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const sha = context.sha.slice(0, 7);
            const ts = new Date().toUTCString();
            const body = `## 📦 Latest APK (debug)\n\n**[⬇️ Download app-debug artifact](${runUrl})**\n\nOpen the link → scroll to **Artifacts** → tap **app-debug** → install.\n\n> Built from commit \`${sha}\` · ${ts}`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: 2,
            });
            const existing = comments.find(c => c.body.startsWith('## 📦 Latest APK'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: 2,
                body,
              });
            }
